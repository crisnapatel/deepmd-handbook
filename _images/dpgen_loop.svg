<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="720" height="550" viewBox="-360.0 -275.0 720 550">
<defs>
<marker markerWidth="7.199999999999999" markerHeight="4.800000000000001" viewBox="-1 -0.4 1.2 0.8" orient="auto" id="d0">
<path d="M-1,-0.4 L0.2,0 L-1,0.4 Z" fill="#555" />
</marker>
</defs>
<rect x="-360" y="-275" width="720" height="550" fill="white" />
<text x="0" y="-235" font-size="20" text-anchor="middle" font-weight="bold" fill="#333">The DP-GEN Active Learning Loop</text>
<rect x="-80.0" y="-190" width="160" height="80" rx="8" ry="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5" />
<text x="0" y="-170" font-size="11" text-anchor="middle" fill="#666">01.train</text>
<text x="0" y="-150" font-size="16" text-anchor="middle" font-weight="bold" fill="#1565C0">Train 4 Models</text>
<text x="0" y="-130" font-size="10" text-anchor="middle" fill="#666">(different random seeds)</text>
<rect x="110" y="0" width="160" height="80" rx="8" ry="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5" />
<text x="190" y="20" font-size="11" text-anchor="middle" fill="#666">02.model_devi</text>
<text x="190" y="40" font-size="16" text-anchor="middle" font-weight="bold" fill="#E65100">Explore (LAMMPS)</text>
<text x="190" y="60" font-size="10" text-anchor="middle" fill="#666">Run MD, measure deviation</text>
<rect x="-270" y="0" width="160" height="80" rx="8" ry="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5" />
<text x="-190" y="20" font-size="11" text-anchor="middle" fill="#666">03.fp</text>
<text x="-190" y="40" font-size="16" text-anchor="middle" font-weight="bold" fill="#2E7D32">Label (DFT)</text>
<text x="-190" y="60" font-size="10" text-anchor="middle" fill="#666">QE / VASP on candidates</text>
<path d="M80,-150 C160,-150,190,-60,190,0" stroke="#555" stroke-width="2" fill="none" marker-end="url(#d0)" />
<path d="M110,50 L-110,50" stroke="#555" stroke-width="2" fill="none" marker-end="url(#d0)" />
<text x="0" y="70" font-size="11" text-anchor="middle" fill="#555" font-style="italic">Select candidates</text>
<text x="0" y="84" font-size="10" text-anchor="middle" fill="#888">(trust_lo &lt; σ_f &lt; trust_hi)</text>
<path d="M-190,0 C-190,-60,-160,-150,-80,-150" stroke="#555" stroke-width="2" fill="none" marker-end="url(#d0)" />
<text x="-100" y="-60" font-size="12" text-anchor="middle" fill="#999" font-style="italic">Repeat until convergence</text>
<rect x="-260" y="140" width="520" height="95" rx="6" ry="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1.5" />
<text x="0" y="158" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">Model Deviation Classification</text>
<rect x="-240" y="170" width="150" height="50" rx="4" ry="4" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" />
<text x="-165" y="190" font-size="12" text-anchor="middle" fill="#2E7D32">σ_f &lt; trust_lo</text>
<text x="-165" y="207" font-size="12" text-anchor="middle" font-weight="bold" fill="#2E7D32">ACCURATE</text>
<rect x="-75" y="170" width="150" height="50" rx="4" ry="4" fill="#FFE0B2" stroke="#FF9800" stroke-width="1.5" />
<text x="0" y="190" font-size="11" text-anchor="middle" fill="#E65100">trust_lo ≤ σ_f &lt; trust_hi</text>
<text x="0" y="207" font-size="11" text-anchor="middle" font-weight="bold" fill="#E65100">CANDIDATE → DFT</text>
<rect x="90" y="170" width="150" height="50" rx="4" ry="4" fill="#FFCDD2" stroke="#F44336" stroke-width="1.5" />
<text x="165" y="190" font-size="12" text-anchor="middle" fill="#C62828">σ_f ≥ trust_hi</text>
<text x="165" y="207" font-size="12" text-anchor="middle" font-weight="bold" fill="#C62828">FAILED → skip</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="700" height="350" viewBox="0 0 700 350">
<defs>
<marker markerWidth="7.0" markerHeight="7.0" viewBox="-0.5 -0.5 1.0 1.0" orient="auto" id="d0">
<path d="M-0.5,-0.5 L-0.5,0.5 L0.5,0 Z" fill="#555" />
</marker>
</defs>
<rect x="0" y="0" width="700" height="350" fill="white" />
<text x="350" y="25" font-size="18" text-anchor="middle" font-weight="bold" fill="#333">LAMMPS with pair_style deepmd</text>
<rect x="30" y="107.5" width="130" height="65" rx="8" ry="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" />
<text x="95" y="132" font-size="14" text-anchor="middle" font-weight="bold" fill="#2E7D32" font-family="monospace">graph.pb</text>
<text x="95" y="150" font-size="10" text-anchor="middle" fill="#666">Frozen model</text>
<text x="95" y="163" font-size="9" text-anchor="middle" fill="#999">(from dp freeze)</text>
<path d="M160,140 L200,140" stroke="#555" stroke-width="2" marker-end="url(#d0)" />
<rect x="210" y="92.5" width="170" height="95" rx="8" ry="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" />
<text x="300" y="122" font-size="16" text-anchor="middle" font-weight="bold" fill="#1565C0">LAMMPS</text>
<text x="300" y="140" font-size="11" text-anchor="middle" fill="#1565C0" font-family="monospace">pair_style deepmd</text>
<text x="300" y="158" font-size="9" text-anchor="middle" fill="#666">positions → model → forces</text>
<text x="300" y="172" font-size="9" text-anchor="middle" fill="#999">(every timestep)</text>
<path d="M390,140 L430,140" stroke="#555" stroke-width="2" marker-end="url(#d0)" />
<rect x="440" y="82.5" width="210" height="115" rx="8" ry="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2" />
<text x="530" y="115" font-size="14" text-anchor="middle" font-weight="bold" fill="#E65100">MD Trajectory</text>
<text x="460" y="135" font-size="10" fill="#E65100" font-family="monospace" font-weight="bold">dump.lammpstrj</text>
<text x="555" y="135" font-size="8" fill="#999">positions, velocities</text>
<text x="460" y="155" font-size="10" fill="#E65100" font-family="monospace" font-weight="bold">log.lammps</text>
<text x="555" y="155" font-size="8" fill="#999">thermo output</text>
<text x="460" y="175" font-size="10" fill="#E65100" font-family="monospace" font-weight="bold">md.out</text>
<text x="555" y="175" font-size="8" fill="#999">model deviation</text>
<rect x="50" y="240" width="600" height="90" rx="8" ry="8" fill="#FAFAFA" stroke="#DDD" stroke-width="1.5" />
<text x="350" y="256" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">What happens at each timestep:</text>
<circle cx="70" cy="270" r="8" fill="#1565C0" opacity="0.15" />
<text x="70" y="273" font-size="9" text-anchor="middle" font-weight="bold" fill="#1565C0">1</text>
<text x="85" y="272" font-size="10" fill="#555">LAMMPS sends atomic positions to the NN</text>
<circle cx="70" cy="285" r="8" fill="#2E7D32" opacity="0.15" />
<text x="70" y="288" font-size="9" text-anchor="middle" font-weight="bold" fill="#2E7D32">2</text>
<text x="85" y="287" font-size="10" fill="#555">NN computes per-atom energies and forces</text>
<circle cx="70" cy="300" r="8" fill="#E65100" opacity="0.15" />
<text x="70" y="303" font-size="9" text-anchor="middle" font-weight="bold" fill="#E65100">3</text>
<text x="85" y="302" font-size="10" fill="#555">LAMMPS uses forces to integrate equations of motion</text>
<circle cx="70" cy="315" r="8" fill="#7B1FA2" opacity="0.15" />
<text x="70" y="318" font-size="9" text-anchor="middle" font-weight="bold" fill="#7B1FA2">4</text>
<text x="85" y="317" font-size="10" fill="#555">Repeat (no QM calculation needed)</text>
</svg>
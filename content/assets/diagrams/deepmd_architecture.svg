<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="800" height="380" viewBox="0 0 800 380">
<defs>
<marker markerWidth="7.0" markerHeight="7.0" viewBox="-0.5 -0.5 1.0 1.0" orient="auto" id="d0">
<path d="M-0.5,-0.5 L-0.5,0.5 L0.5,0 Z" fill="#888" />
</marker>
</defs>
<rect x="0" y="0" width="800" height="380" fill="white" />
<text x="400" y="25" font-size="18" text-anchor="middle" font-weight="bold" fill="#333">DeePMD-kit Architecture (se_e2_a)</text>
<rect x="0.0" y="155.0" width="120" height="70" rx="8" ry="8" fill="#ECEFF1" stroke="#546E7A" stroke-width="2" />
<text x="60" y="182" font-size="13" text-anchor="middle" font-weight="bold" fill="#546E7A">Atomic</text>
<text x="60" y="198" font-size="13" text-anchor="middle" font-weight="bold" fill="#546E7A">Coordinates</text>
<text x="60" y="239.0" font-size="9" text-anchor="middle" fill="#888">R = {r₁, r₂, ...}</text>
<path d="M122.0,190 L142.0,190" stroke="#888" stroke-width="2" marker-end="url(#d0)" />
<rect x="150.0" y="155.0" width="120" height="70" rx="8" ry="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" />
<text x="210" y="182" font-size="13" text-anchor="middle" font-weight="bold" fill="#1565C0">Local</text>
<text x="210" y="198" font-size="13" text-anchor="middle" font-weight="bold" fill="#1565C0">Environment</text>
<text x="210" y="239.0" font-size="9" text-anchor="middle" fill="#888">R̃ᵢ (neighbor list)</text>
<path d="M272.0,190 L302.0,190" stroke="#888" stroke-width="2" marker-end="url(#d0)" />
<rect x="310.0" y="155.0" width="120" height="70" rx="8" ry="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2" />
<text x="370" y="182" font-size="13" text-anchor="middle" font-weight="bold" fill="#E65100">Descriptor</text>
<text x="370" y="198" font-size="13" text-anchor="middle" font-weight="bold" fill="#E65100">(se_e2_a)</text>
<text x="370" y="239.0" font-size="9" text-anchor="middle" fill="#888">Dᵢ = R̃ᵢᵀ · G(R̃ᵢ) · R̃ᵢ</text>
<path d="M432.0,190 L462.0,190" stroke="#888" stroke-width="2" marker-end="url(#d0)" />
<rect x="470.0" y="155.0" width="120" height="70" rx="8" ry="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" />
<text x="530" y="182" font-size="13" text-anchor="middle" font-weight="bold" fill="#2E7D32">Fitting</text>
<text x="530" y="198" font-size="13" text-anchor="middle" font-weight="bold" fill="#2E7D32">Network</text>
<text x="530" y="239.0" font-size="9" text-anchor="middle" fill="#888">[240, 240, 240]</text>
<path d="M592.0,190 L622.0,190" stroke="#888" stroke-width="2" marker-end="url(#d0)" />
<rect x="630.0" y="155.0" width="120" height="70" rx="8" ry="8" fill="#FCE4EC" stroke="#C62828" stroke-width="2" />
<text x="690" y="182" font-size="13" text-anchor="middle" font-weight="bold" fill="#C62828">Energy</text>
<text x="690" y="198" font-size="13" text-anchor="middle" font-weight="bold" fill="#C62828">Forces</text>
<text x="690" y="239.0" font-size="9" text-anchor="middle" fill="#888">E = ΣEᵢ, F = -∇E</text>
<rect x="140" y="275" width="240" height="80" rx="6" ry="6" fill="#FFF8E1" stroke="#FFB300" stroke-width="1.5" />
<text x="260" y="290" font-size="11" text-anchor="middle" font-weight="bold" fill="#F57F17">Descriptor Parameters</text>
<text x="160" y="305" font-size="9" fill="#555">rcut = 6.0 Å (cutoff radius)</text>
<text x="160" y="319" font-size="9" fill="#555">rcut_smth = 2.0 Å (smooth start)</text>
<text x="160" y="333" font-size="9" fill="#555">sel = [60, 120] (max neighbors)</text>
<text x="160" y="347" font-size="9" fill="#555">neuron = [25, 50, 100] (embedding)</text>
<rect x="430" y="275" width="220" height="80" rx="6" ry="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" />
<text x="540" y="290" font-size="11" text-anchor="middle" font-weight="bold" fill="#2E7D32">Fitting Net Parameters</text>
<text x="445" y="305" font-size="9" fill="#555">3 hidden layers: [240, 240, 240]</text>
<text x="445" y="319" font-size="9" fill="#555">resnet_dt = true</text>
<text x="445" y="333" font-size="9" fill="#555">Activation: tanh</text>
<text x="445" y="347" font-size="9" fill="#555">Output: per-atom energy Eᵢ</text>
<path d="M370,225.0 L260,275" stroke="#FFB300" stroke-width="1" stroke-dasharray="4" />
<path d="M530,225.0 L540,275" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4" />
<rect x="10" y="50" width="200" height="50" rx="6" ry="6" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5" />
<text x="110" y="68" font-size="9" text-anchor="middle" fill="#3F51B5">Key: Each atom gets its own</text>
<text x="110" y="82" font-size="9" text-anchor="middle" font-weight="bold" fill="#3F51B5">descriptor → fitting net → Eᵢ</text>
</svg>